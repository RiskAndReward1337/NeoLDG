name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: NeoLDG
  QT_VERSION: "6.8.3"

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Resolve release version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          echo "VERSION=${version}" >> "${GITHUB_ENV}"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtserialport
          cache: true

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils patchelf

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Install into AppDir
        run: cmake --install build --prefix AppDir/usr

      - name: Add desktop integration assets
        run: |
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          cp packaging/NeoLDG.desktop AppDir/usr/share/applications/NeoLDG.desktop
          cp packaging/NeoLDG.svg AppDir/usr/share/icons/hicolor/scalable/apps/NeoLDG.svg

      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          export QMAKE="$(command -v qmake || command -v qmake6)"

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/NeoLDG.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/NeoLDG.svg \
            --plugin qt \
            --output appimage

          appimage_path="$(find . -maxdepth 1 -name '*.AppImage' ! -name 'linuxdeploy*.AppImage' | head -n 1)"
          mv "${appimage_path}" "${APP_NAME}-${VERSION}-linux-x86_64.AppImage"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: linux-release
          path: NeoLDG-*-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Resolve release version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.Substring(1)
          } else {
            $version = "dev-$($env:GITHUB_SHA.Substring(0, 7))"
          }
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtserialport
          cache: true

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Bundle Windows runtime
        shell: pwsh
        run: |
          $exe = Resolve-Path "build/Release/NeoLDG.exe"
          windeployqt --release --no-translations --compiler-runtime $exe
          Copy-Item README.md build/Release/
          Copy-Item LICENSE build/Release/

      - name: Create Windows zip
        shell: pwsh
        run: |
          $zipPath = "$env:APP_NAME-$env:VERSION-windows-x64.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath
          }
          Compress-Archive -Path build/Release/* -DestinationPath $zipPath

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-release
          path: NeoLDG-*-windows-x64.zip

  release:
    if: github.ref_type == 'tag'
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-24.04

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi
